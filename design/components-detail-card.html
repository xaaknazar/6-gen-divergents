<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--fg); font-family: var(--font-body); }
  .card { padding: 22px 24px; display: flex; flex-direction: column; gap: 10px; }
  .answer-btn {
    width: 100%;
    display: flex; align-items: center; gap: 14px;
    padding: 14px 18px;
    border-radius: 12px;
    border: 1.5px solid rgba(255,255,255,0.16);
    background: rgba(0, 0, 0, 0.18);
    color: #eef2ff;
    font-family: inherit;
    text-align: left;
    font-size: 14px;
    font-weight: 500;
    box-sizing: border-box;
    cursor: pointer;
  }
  .answer-btn .dot {
    width: 18px; height: 18px;
    border-radius: 50%;
    border: 1.5px solid rgba(255,255,255,0.3);
    flex-shrink: 0;
    position: relative;
  }
  .answer-btn.hover {
    border-color: #7c9cff;
    background: rgba(124,156,255,0.08);
    transform: translateX(3px);
  }
  .answer-btn.hover .dot { border-color: #7c9cff; }
  .answer-btn.selected {
    border-color: #7c9cff;
    background: rgba(124,156,255,0.15);
  }
  .answer-btn.selected .dot { border-color: #7c9cff; }
  .answer-btn.selected .dot::after {
    content: '';
    position: absolute; inset: 3px;
    border-radius: 50%;
    background: #7c9cff;
  }
  .meta { font-size: 11px; color: #6f7896; margin-left: auto; font-family: ui-monospace, Menlo, monospace; }
</style>
</head>
<body>
<div class="card">
  <button class="answer-btn"><span class="dot"></span><span>Совершенно не согласен(-на)</span><span class="meta">rest</span></button>
  <button class="answer-btn hover"><span class="dot"></span><span>Иногда / немного</span><span class="meta">hover</span></button>
  <button class="answer-btn selected"><span class="dot"></span><span>Полностью согласен(-на)</span><span class="meta">selected</span></button>
</div>
</body>
</html>

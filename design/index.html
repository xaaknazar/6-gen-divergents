<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<title>Divergents · 6 Geniuses · PDF Report (Print)</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; background: #faf8f3; color: #1a1d24; font-family: 'Manrope', sans-serif; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
  body { padding: 0; }
  #root { display: flex; flex-direction: column; align-items: center; }
  section {
    width: 794px;
    min-height: 1123px;
    margin: 0 auto;
    box-shadow: none !important;
    background: #faf8f3;
    position: relative;
    overflow: hidden;
    box-sizing: border-box;
    page-break-after: always;
    break-after: page;
  }
  section:last-of-type { page-break-after: auto; break-after: auto; }

  @page {
    size: A4 portrait;
    margin: 0;
  }

  @media print {
    html, body { background: white; }
    section { margin: 0 !important; box-shadow: none !important; }
  }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="GearSVG.jsx" data-plugins="transform-react-jsx-source" data-filename="GearSVG.jsx"></script>
<script type="text/babel" src="ReportShell.jsx" data-plugins="transform-react-jsx-source" data-filename="ReportShell.jsx"></script>
<script type="text/babel" src="CoverPage.jsx" data-plugins="transform-react-jsx-source" data-filename="CoverPage.jsx"></script>
<script type="text/babel" src="OverviewPage.jsx" data-plugins="transform-react-jsx-source" data-filename="OverviewPage.jsx"></script>
<script type="text/babel" src="SummaryPage.jsx" data-plugins="transform-react-jsx-source" data-filename="SummaryPage.jsx"></script>
<script type="text/babel" src="ResultsPages.jsx" data-plugins="transform-react-jsx-source" data-filename="ResultsPages.jsx"></script>
<script type="text/babel" src="PairingPage.jsx" data-plugins="transform-react-jsx-source" data-filename="PairingPage.jsx"></script>
<script type="text/babel" src="NextStepsPage.jsx" data-plugins="transform-react-jsx-source" data-filename="NextStepsPage.jsx"></script>
<script type="text/babel" data-plugins="transform-react-jsx-source" data-filename="inline-app">
  function App() {
    const name = 'Азамат Жусупов';
    const top = ['E','W'];
    const mid = ['G','D'];
    const low = ['T','I'];
    return (
      <>
        <CoverPage name={name} top={top} />
        <OverviewPage name={name} />
        <SummaryPage name={name} top={top} mid={mid} low={low} />
        <GeniusesPage name={name} top={top} />
        <CompetenciesPage name={name} mid={mid} />
        <FrustrationsPage name={name} low={low} />
        <PairingPage name={name} top={top} />
        <NextStepsPage name={name} />
      </>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<App />);

  // Auto-print when ready
  (async () => {
    try { await document.fonts.ready; } catch(e) {}
    // Wait a bit for React + images to settle
    await new Promise(r => setTimeout(r, 800));
    window.print();
  })();
</script>
</body>
</html>

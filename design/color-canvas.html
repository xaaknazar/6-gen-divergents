<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--fg); font-family: var(--font-body); }
  .card { padding: 22px 24px; display: flex; gap: 18px; align-items: center; flex-wrap: wrap; }
  .swatch {
    width: 62px; height: 62px;
    border-radius: 12px;
    display: grid; place-items: center;
    font-family: 'Unbounded', sans-serif;
    font-size: 30px;
    font-weight: 700;
    flex-shrink: 0;
  }
  .item { text-align: center; }
  .item .lab { font-size: 10.5px; color: #6f7896; text-transform: uppercase; letter-spacing: 0.08em; font-weight: 700; margin-top: 6px; }
  .item .ru { font-size: 11px; color: #a6b0cf; margin-top: 2px; }
</style>
</head>
<body>
<div class="card">
  <div class="item"><div class="swatch" style="background:rgba(139,92,246,0.15); color:#8b5cf6;">✦</div><div class="ru">Задумка</div><div class="lab">U+2726</div></div>
  <div class="item"><div class="swatch" style="background:rgba(245,158,11,0.15); color:#f59e0b;">✸</div><div class="ru">Изобретение</div><div class="lab">U+2738</div></div>
  <div class="item"><div class="swatch" style="background:rgba(20,184,166,0.15); color:#14b8a6;">◈</div><div class="ru">Оценка</div><div class="lab">U+25C8</div></div>
  <div class="item"><div class="swatch" style="background:rgba(239,68,68,0.15); color:#ef4444;">▲</div><div class="ru">Гальванизация</div><div class="lab">U+25B2</div></div>
  <div class="item"><div class="swatch" style="background:rgba(16,185,129,0.15); color:#10b981;">♥</div><div class="ru">Поддержка</div><div class="lab">U+2665</div></div>
  <div class="item"><div class="swatch" style="background:rgba(59,130,246,0.15); color:#3b82f6;">◆</div><div class="ru">Доводка</div><div class="lab">U+25C6</div></div>
</div>
</body>
</html>

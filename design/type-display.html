<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--fg); font-family: var(--font-body); }
  .card { padding: 28px 24px; display: flex; gap: 28px; align-items: center; }
  .demo {
    width: 150px; height: 100px;
    background: rgba(255,255,255,0.07);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 16px;
    display: flex; align-items: center; justify-content: center;
    font-family: ui-monospace, Menlo, monospace;
    font-size: 11px;
    color: #a6b0cf;
    text-align: center;
    padding: 8px;
  }
  .demo.ambient { box-shadow: 0 30px 80px -20px rgba(0,0,0,0.6); }
  .demo.btn {
    background: linear-gradient(135deg,#7c9cff,#b794ff);
    color: #0a0e1a;
    font-family: var(--font-body);
    font-weight: 700;
    box-shadow: 0 8px 24px -8px rgba(124,156,255,0.6);
  }
  .demo.glass {
    backdrop-filter: blur(14px);
    background: rgba(255,255,255,0.04);
  }
  .lab { font-size: 11px; color: #6f7896; letter-spacing: 0.08em; text-transform: uppercase; font-weight: 700; margin-top: 10px; text-align: center; }
  .body-grid {
    position: absolute; inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.04) 1px, transparent 1px);
    background-size: 40px 40px;
    mask-image: radial-gradient(circle at 50% 40%, black 0%, transparent 80%);
    pointer-events: none;
  }
  .card { position: relative; overflow: hidden; }
</style>
</head>
<body>
<div class="card">
  <div class="body-grid"></div>
  <div style="position:relative">
    <div class="demo ambient">card · 18px radius</div>
    <div class="lab">Ambient shadow</div>
  </div>
  <div style="position:relative">
    <div class="demo btn">button lift</div>
    <div class="lab">Button shadow (accent)</div>
  </div>
  <div style="position:relative">
    <div class="demo glass">backdrop blur 14px</div>
    <div class="lab">Glass card</div>
  </div>
</div>
</body>
</html>

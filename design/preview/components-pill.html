<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--fg); font-family: var(--font-body); }
  .card { padding: 22px 24px; display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }
  .pill {
    display: flex; align-items: center; gap: 12px;
    padding: 14px;
    border-radius: 12px;
    border: 1px solid rgba(255,255,255,0.1);
    background: rgba(255,255,255,0.07);
  }
  .mark {
    width: 38px; height: 38px;
    display: grid; place-items: center;
    border-radius: 10px;
    font-size: 18px;
    font-weight: 700;
    font-family: var(--font-display);
    flex-shrink: 0;
  }
  .info { flex: 1; min-width: 0; }
  .name {
    font-weight: 700; font-size: 14px; margin: 0 0 2px;
  }
  .tag { color: #6f7896; font-size: 11px; line-height: 1.3; }
  .score {
    font-family: var(--font-display);
    font-size: 18px;
    font-weight: 700;
  }
</style>
</head>
<body>
<div class="card">
  <div class="pill">
    <div class="mark" style="background:rgba(139,92,246,0.15); color:#8b5cf6;">✦</div>
    <div class="info"><div class="name">Задумка</div><div class="tag">Замечаете возможности</div></div>
    <div class="score" style="color:#8b5cf6">86%</div>
  </div>
  <div class="pill">
    <div class="mark" style="background:rgba(16,185,129,0.15); color:#10b981;">♥</div>
    <div class="info"><div class="name">Поддержка</div><div class="tag">Отзывчивость и забота</div></div>
    <div class="score" style="color:#10b981">81%</div>
  </div>
  <div class="pill">
    <div class="mark" style="background:rgba(20,184,166,0.15); color:#14b8a6;">◈</div>
    <div class="info"><div class="name">Оценка</div><div class="tag">Интуитивные суждения</div></div>
    <div class="score" style="color:#14b8a6">67%</div>
  </div>
</div>
</body>
</html>

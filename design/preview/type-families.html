<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--fg); font-family: var(--font-body); }
  .card { padding: 22px 24px; display: grid; grid-template-columns: 1fr 1fr; gap: 22px; }
  .col h4 { font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; color: #6f7896; margin: 0 0 10px; }
  .spec { display: flex; align-items: baseline; gap: 12px; line-height: 1.2; margin-bottom: 8px; font-family: 'Unbounded', sans-serif; font-weight: 700; }
  .spec .meta { color: #6f7896; font-size: 10px; font-family: ui-monospace, Menlo, monospace; white-space: nowrap; }
  .manrope { font-family: 'Manrope', sans-serif; }
  .manrope .spec { font-family: 'Manrope', sans-serif; font-weight: 500; }
  .w400 { font-weight: 400 !important; }
  .w500 { font-weight: 500 !important; }
  .w600 { font-weight: 600 !important; }
  .w700 { font-weight: 700 !important; }
  .w800 { font-weight: 800 !important; }
</style>
</head>
<body>
<div class="card">
  <div class="col">
    <h4>Unbounded · Display</h4>
    <div class="spec w500"><span>Aa Задумка</span><span class="meta">500</span></div>
    <div class="spec w700"><span>Aa Задумка</span><span class="meta">700</span></div>
  </div>
  <div class="col manrope">
    <h4>Manrope · Body</h4>
    <div class="spec w400"><span>Aa Поддержка</span><span class="meta">400</span></div>
    <div class="spec w500"><span>Aa Поддержка</span><span class="meta">500</span></div>
    <div class="spec w600"><span>Aa Поддержка</span><span class="meta">600</span></div>
    <div class="spec w700"><span>Aa Поддержка</span><span class="meta">700</span></div>
    <div class="spec w800"><span>Aa Поддержка</span><span class="meta">800</span></div>
  </div>
</div>
</body>
</html>

<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--fg); font-family: var(--font-body); }
  .card { padding: 24px; }
  .display {
    font-family: var(--font-display);
    font-weight: 700;
    font-size: 48px;
    line-height: 1.05;
    letter-spacing: -0.02em;
    margin: 0 0 6px;
  }
  .grad {
    background: linear-gradient(135deg, #7c9cff 0%, #b794ff 45%, #ffb199 100%);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }
  .meta { color: #6f7896; font-size: 12px; letter-spacing: 0.08em; text-transform: uppercase; font-weight: 700; margin-top: 10px; font-family: var(--font-body); }
</style>
</head>
<body>
<div class="card">
  <div class="display">Найди свой <span class="grad">рабочий талант</span></div>
  <div class="meta">Unbounded · 700 · 48px · -0.02em · line-height 1.05</div>
</div>
</body>
</html>

<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--fg); }
  .card {
    padding: 22px 24px;
    background: var(--bg);
    background-image:
      linear-gradient(rgba(255,255,255,0.035) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.035) 1px, transparent 1px);
    background-size: 56px 56px;
    position: relative;
    overflow: hidden;
  }
  .card::after {
    content: '';
    position: absolute; inset: -40% -10% auto -10%; height: 120%;
    background: radial-gradient(closest-side, rgba(124,156,255,0.22), transparent 70%),
                radial-gradient(closest-side, rgba(183,148,255,0.15) 0%, transparent 70%);
    filter: blur(30px);
    pointer-events: none;
  }
  .row { display: flex; gap: 10px; flex-wrap: wrap; align-items: stretch; position: relative; z-index: 1; }
  .swatch {
    flex: 1 1 0;
    min-width: 0;
    border-radius: 12px;
    padding: 14px 14px 12px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    min-height: 108px;
    font-family: var(--font-body);
    border: 1px solid rgba(255,255,255,0.1);
  }
  .swatch .name {
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.01em;
  }
  .swatch .hex {
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    font-size: 11px;
    opacity: 0.85;
    letter-spacing: 0.02em;
  }
  .swatch .token {
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    font-size: 10.5px;
    opacity: 0.7;
    margin-top: 2px;
  }
</style>
</head>
<body>
<div class="card">
  <div class="row">
    <div class="swatch" style="background:#0a0e1a; color:#eef2ff;">
      <div><div class="name">Canvas</div><div class="token">--bg</div></div>
      <div class="hex">#0A0E1A</div>
    </div>
    <div class="swatch" style="background:#111831; color:#eef2ff;">
      <div><div class="name">Canvas Soft</div><div class="token">--bg-soft</div></div>
      <div class="hex">#111831</div>
    </div>
    <div class="swatch" style="background:rgba(255,255,255,0.04); color:#eef2ff;">
      <div><div class="name">Surface</div><div class="token">--surface</div></div>
      <div class="hex">#FFF · 4%</div>
    </div>
    <div class="swatch" style="background:rgba(255,255,255,0.07); color:#eef2ff;">
      <div><div class="name">Surface Strong</div><div class="token">--surface-strong</div></div>
      <div class="hex">#FFF · 7%</div>
    </div>
    <div class="swatch" style="background:rgba(0,0,0,0.25); color:#eef2ff; border-color: rgba(255,255,255,0.16);">
      <div><div class="name">Inset</div><div class="token">--surface-inset</div></div>
      <div class="hex">#000 · 25%</div>
    </div>
  </div>
</div>
</body>
</html>

<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--fg); font-family: var(--font-body); }
  .card { padding: 22px 24px; display: grid; grid-template-columns: 1fr 1fr; gap: 14px; align-items: start; }
  .field-label {
    display: block;
    font-size: 13px;
    color: #a6b0cf;
    margin-bottom: 8px;
    font-weight: 500;
  }
  input {
    width: 100%;
    padding: 13px 16px;
    background: rgba(0, 0, 0, 0.25);
    border: 1px solid rgba(255,255,255,0.16);
    border-radius: 12px;
    color: #eef2ff;
    font-size: 15px;
    font-family: inherit;
    outline: none;
    box-sizing: border-box;
  }
  input.focus {
    border-color: #7c9cff;
    background: rgba(0, 0, 0, 0.4);
  }
  .bar-wrap { grid-column: 1 / -1; }
  .progress-info {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    color: #a6b0cf;
    margin-bottom: 8px;
    font-weight: 600;
    letter-spacing: 0.04em;
  }
  .progress-bar {
    height: 6px;
    background: rgba(255,255,255,0.06);
    border-radius: 999px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    width: 62%;
    background: linear-gradient(90deg, #7c9cff, #b794ff);
    border-radius: 999px;
  }
</style>
</head>
<body>
<div class="card">
  <div>
    <span class="field-label">Имя и фамилия</span>
    <input type="text" value="Азамат Жусупов" />
  </div>
  <div>
    <span class="field-label">Email <span style="color:#6f7896">(focused)</span></span>
    <input class="focus" type="email" value="azamat@divergents.kz" />
  </div>
  <div class="bar-wrap">
    <div class="progress-info"><span>26 из 42</span><span>62%</span></div>
    <div class="progress-bar"><div class="progress-fill"></div></div>
  </div>
</div>
</body>
</html>

<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--fg); font-family: var(--font-body); }
  .card { padding: 22px 24px; }
  .detail {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.09);
    border-radius: 18px;
    padding: 22px;
    position: relative;
    overflow: hidden;
  }
  .detail::before {
    content: '';
    position: absolute;
    inset: 0 auto 0 0;
    width: 3px;
    background: #8b5cf6;
  }
  .head { display: flex; align-items: center; gap: 14px; margin-bottom: 12px; }
  .mark {
    width: 42px; height: 42px;
    display: grid; place-items: center;
    border-radius: 12px;
    font-size: 18px;
    font-weight: 700;
    background: rgba(139,92,246,0.15);
    color: #8b5cf6;
    font-family: var(--font-display);
  }
  .title {
    font-family: var(--font-display);
    font-size: 18px;
    font-weight: 700;
    margin: 0 0 2px;
    letter-spacing: -0.01em;
  }
  .sub {
    font-size: 11px;
    color: #6f7896;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    font-weight: 600;
  }
  .score {
    margin-left: auto;
    font-family: var(--font-display);
    font-size: 22px;
    font-weight: 700;
    color: #8b5cf6;
  }
  .score small { color: #6f7896; font-size: 13px; font-weight: 500; }
  .desc { color: #a6b0cf; font-size: 13.5px; line-height: 1.55; margin: 0; }
</style>
</head>
<body>
<div class="card">
  <div class="detail">
    <div class="head">
      <div class="mark">✦</div>
      <div><div class="title">Задумка</div><div class="sub">Wonder</div></div>
      <div class="score">86<small>%</small></div>
    </div>
    <p class="desc">Люди с даром Задумки тонко чувствуют неиспользованный потенциал. Они задаются большими вопросами и ищут глубокий смысл там, где другие видят рутину.</p>
  </div>
</div>
</body>
</html>

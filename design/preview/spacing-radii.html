<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--fg); font-family: var(--font-body); }
  .card { padding: 22px 24px; display: flex; gap: 22px; align-items: stretch; }
  .group { flex: 1; }
  h4 { font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; color: #6f7896; margin: 0 0 12px; font-weight: 700; }
  .radii { display: flex; gap: 10px; align-items: flex-end; }
  .r {
    width: 62px; height: 62px;
    background: rgba(255,255,255,0.07);
    border: 1px solid rgba(255,255,255,0.16);
    display: flex; align-items: flex-end; justify-content: center;
    padding-bottom: 6px;
    font-size: 10px; color: #a6b0cf;
    font-family: ui-monospace, Menlo, monospace;
  }
  .spacing { display: flex; gap: 4px; align-items: flex-end; height: 80px; }
  .s {
    background: linear-gradient(135deg,#7c9cff,#b794ff);
    border-radius: 4px;
    width: 18px;
    position: relative;
  }
  .s::after {
    content: attr(data-label);
    position: absolute;
    bottom: -16px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 9.5px;
    color: #6f7896;
    font-family: ui-monospace, Menlo, monospace;
  }
</style>
</head>
<body>
<div class="card">
  <div class="group">
    <h4>Radii</h4>
    <div class="radii">
      <div class="r" style="border-radius:3px">3</div>
      <div class="r" style="border-radius:10px">10</div>
      <div class="r" style="border-radius:12px">12</div>
      <div class="r" style="border-radius:18px">18</div>
      <div class="r" style="border-radius:999px">pill</div>
    </div>
  </div>
  <div class="group">
    <h4>Spacing · 8pt</h4>
    <div class="spacing">
      <div class="s" data-label="4"  style="height:4px"></div>
      <div class="s" data-label="8"  style="height:8px"></div>
      <div class="s" data-label="12" style="height:12px"></div>
      <div class="s" data-label="16" style="height:16px"></div>
      <div class="s" data-label="20" style="height:20px"></div>
      <div class="s" data-label="24" style="height:24px"></div>
      <div class="s" data-label="32" style="height:32px"></div>
      <div class="s" data-label="40" style="height:40px"></div>
      <div class="s" data-label="56" style="height:56px"></div>
    </div>
  </div>
</div>
</body>
</html>

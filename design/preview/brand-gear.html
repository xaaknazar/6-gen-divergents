<!doctype html>
<html lang="en">
<head>

<style>
  html, body { margin: 0; padding: 0; background: #f4f1ea; color: #222; font-family: 'Manrope', sans-serif; }
  .card { padding: 20px 24px; display: flex; gap: 14px; align-items: center; }
  .gear { width: 72px; height: 72px; flex-shrink: 0; }
  .gear svg { width: 100%; height: 100%; display: block; }
  .label { font-size: 10px; color: #888; text-transform: uppercase; letter-spacing: 0.1em; text-align: center; margin-top: 4px; font-weight: 700; }
  .col { text-align: center; }
</style>
</head>
<body>
<div class="card">
  <div class="col">

    </div>

  </div>

    <div class="gear">
      <svg viewBox="-52 -52 104 104"><g fill="#c04a3e" stroke="#c04a3e" stroke-width="1.5" stroke-linejoin="round"><path d="M -8 -46 L 8 -46 L 11 -37 L 20 -34 L 28 -40 L 40 -28 L 34 -20 L 37 -11 L 46 -8 L 46 8 L 37 11 L 34 20 L 40 28 L 28 40 L 20 34 L 11 37 L 8 46 L -8 46 L -11 37 L -20 34 L -28 40 L -40 28 L -34 20 L -37 11 L -46 8 L -46 -8 L -37 -11 L -34 -20 L -40 -28 L -28 -40 L -20 -34 L -11 -37 Z"/></g><circle r="22" fill="#fff" stroke="#c04a3e" stroke-width="1.5"/><text x="0" y="2" text-anchor="middle" dominant-baseline="middle" font-family="Unbounded" font-weight="700" font-size="26" fill="#c04a3e">T</text></svg>

    <div class="gear">

  <div style="flex:1; font-size: 13px; color: #555; line-height: 1.5;">

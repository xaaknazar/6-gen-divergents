<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--fg); font-family: var(--font-body); }
  .card { padding: 22px 24px; }
  .row { display: flex; gap: 14px; align-items: stretch; }
  .tile {
    flex: 1 1 0;
    border-radius: 14px;
    padding: 18px;
    min-height: 120px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    position: relative;
    overflow: hidden;
  }
  .tile .label { font-size: 12px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; }
  .tile .name  { font-size: 14px; font-weight: 700; margin-top: 4px; }
  .tile .hex   { font-family: ui-monospace, Menlo, monospace; font-size: 11px; opacity: 0.85; }
  .tile.gradient {
    background: linear-gradient(135deg, #7c9cff 0%, #b794ff 45%, #ffb199 100%);
    color: #0a0e1a;
    flex: 2.2 1 0;
  }
  .tile.gradient .hex { opacity: 0.7; }
  .tile.ok { background: rgba(16,185,129,0.15); color: #34d399; border: 1px solid rgba(16,185,129,0.35); }
  .tile.err { background: rgba(248,113,113,0.12); color: #f87171; border: 1px solid rgba(248,113,113,0.35); }
  .tile.ok .hex, .tile.err .hex { color: inherit; }
</style>
</head>
<body>
<div class="card">
  <div class="row">
    <div class="tile gradient">
      <div>
        <div class="label">Signature gradient</div>
        <div class="name">Indigo → Lavender → Peach</div>
      </div>
      <div class="hex">#7C9CFF · #B794FF · #FFB199  ·  linear-gradient(135deg)</div>
    </div>
    <div class="tile ok">
      <div><div class="label">Success</div><div class="name">Completed</div></div>
      <div class="hex">#10B981</div>
    </div>
    <div class="tile err">
      <div><div class="label">Error</div><div class="name">Invalid input</div></div>
      <div class="hex">#F87171</div>
    </div>
  </div>
</div>
</body>
</html>

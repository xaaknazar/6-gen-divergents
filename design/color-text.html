<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--fg); }
  .card { padding: 22px 24px; }
  .row { display: flex; gap: 10px; }
  .swatch {
    flex: 1 1 0;
    min-width: 0;
    border-radius: 12px;
    padding: 14px;
    min-height: 108px;
    color: white;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    font-family: var(--font-body);
    position: relative;
    overflow: hidden;
  }
  .glyph {
    font-family: var(--font-display);
    font-size: 30px;
    line-height: 1;
    text-align: right;
    opacity: 0.95;
  }
  .name { font-size: 13px; font-weight: 700; }
  .ru { font-size: 11px; opacity: 0.85; margin-top: 2px; }
  .hex {
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    font-size: 11px;
    opacity: 0.9;
    letter-spacing: 0.02em;
  }
</style>
</head>
<body>
<div class="card">
  <div class="row">
    <div class="swatch" style="background:#8b5cf6;">
      <div class="glyph">✦</div>
      <div><div class="name">Wonder · W</div><div class="ru">Задумка</div><div class="hex" style="margin-top:6px">#8B5CF6</div></div>
    </div>
    <div class="swatch" style="background:#f59e0b; color:#1a120a;">
      <div class="glyph">✸</div>
      <div><div class="name">Invention · I</div><div class="ru">Изобретение</div><div class="hex" style="margin-top:6px">#F59E0B</div></div>
    </div>
    <div class="swatch" style="background:#14b8a6;">
      <div class="glyph">◈</div>
      <div><div class="name">Discernment · D</div><div class="ru">Оценка</div><div class="hex" style="margin-top:6px">#14B8A6</div></div>
    </div>
    <div class="swatch" style="background:#ef4444;">
      <div class="glyph">▲</div>
      <div><div class="name">Galvanizing · G</div><div class="ru">Гальванизация</div><div class="hex" style="margin-top:6px">#EF4444</div></div>
    </div>
    <div class="swatch" style="background:#10b981;">
      <div class="glyph">♥</div>
      <div><div class="name">Enablement · E</div><div class="ru">Поддержка</div><div class="hex" style="margin-top:6px">#10B981</div></div>
    </div>
    <div class="swatch" style="background:#3b82f6;">
      <div class="glyph">◆</div>
      <div><div class="name">Tenacity · T</div><div class="ru">Доводка</div><div class="hex" style="margin-top:6px">#3B82F6</div></div>
    </div>
  </div>
</div>
</body>
</html>
